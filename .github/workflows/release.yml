name: Build and Release Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y rpm

    - name: Configure CMake
      run: |
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        make

    - name: Create packages
      run: |
        cd build
        cpack -G DEB
        cpack -G RPM
        cpack -G TGZ
        cpack -G ZIP

    - name: List generated packages
      run: |
        ls -la build/*.deb build/*.rpm build/*.tar.gz build/*.zip 2>/dev/null || true

    - name: Upload all artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-packages
        path: |
          build/*.deb
          build/*.rpm
          build/*.tar.gz
          build/*.zip

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: |
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        make

    - name: Create packages
      run: |
        cd build
        cpack -G DragNDrop
        cpack -G TGZ
        cpack -G ZIP

    - name: List generated packages
      run: |
        ls -la build/*.dmg build/*.tar.gz build/*.zip 2>/dev/null || true

    - name: Upload all artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-packages
        path: |
          build/*.dmg
          build/*.tar.gz
          build/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        cmake --build . --config Release

    - name: Create packages
      run: |
        cd build
        cpack -G WIX
        cpack -G ZIP
        cpack -G TGZ

    - name: List generated packages
      shell: bash
      run: |
        ls -la build/*.msi build/*.zip build/*.tar.gz 2>/dev/null || true

    - name: Upload all artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-packages
        path: |
          build/*.msi
          build/*.zip
          build/*.tar.gz

  create-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List all downloaded files
      run: |
        find artifacts -type f
        mkdir -p release_files
        find artifacts -type f -exec cp {} release_files/ \;
        ls -la release_files/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: release_files/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
