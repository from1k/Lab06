name: Build and Release Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y rpm

    - name: Configure CMake
      run: |
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        make

    - name: Create DEB package
      run: |
        cd build
        cpack -G DEB

    - name: Create RPM package
      run: |
        cd build
        cpack -G RPM

    - name: Create Tarball
      run: |
        cd build
        cpack -G TGZ

    - name: Create ZIP archive
      run: |
        cd build
        cpack -G ZIP

    - name: Upload DEB artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-deb
        path: build/*.deb

    - name: Upload RPM artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-rpm
        path: build/*.rpm

    - name: Upload TGZ artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-tgz
        path: build/*.tar.gz

    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-zip
        path: build/*.zip

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: |
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        make

    - name: Create DMG package
      run: |
        cd build
        cpack -G DragNDrop

    - name: Create ZIP archive
      run: |
        cd build
        cpack -G ZIP

    - name: Create TGZ archive
      run: |
        cd build
        cpack -G TGZ

    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg
        path: build/*.dmg

    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-zip
        path: build/*.zip

    - name: Upload TGZ artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-tgz
        path: build/*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        cmake --build . --config Release

    - name: Create MSI package
      run: |
        cd build
        cpack -G WIX

    - name: Create ZIP package
      run: |
        cd build
        cpack -G ZIP

    - name: Create TGZ package
      run: |
        cd build
        cpack -G TGZ

    - name: Upload MSI artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-msi
        path: build/*.msi

    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-zip
        path: build/*.zip

    - name: Upload TGZ artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-tgz
        path: build/*.tar.gz

  create-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/**/*.deb
          artifacts/**/*.rpm
          artifacts/**/*.dmg
          artifacts/**/*.msi
          artifacts/**/*.tar.gz
          artifacts/**/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
